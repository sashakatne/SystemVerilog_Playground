<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <pattern id="small-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1c3d5a" stroke-width="1" opacity="0.45"/>
    </pattern>
    <pattern id="big-grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="url(#small-grid)"/>
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#2d5f82" stroke-width="1.6" opacity="0.55"/>
    </pattern>
    <filter id="paper-noise" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="17" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <filter id="pencil-line" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="9" result="rough"/>
      <feDisplacementMap in="SourceGraphic" in2="rough" scale="1.7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L12,5 z" fill="#d9f7ff"/>
    </marker>
    <style>
      text { font-family: Menlo, Monaco, "Courier New", monospace; fill: #e8fbff; }
      .title { font-size: 42px; font-weight: 700; letter-spacing: 0; }
      .subtitle { font-size: 18px; fill: #9de7ff; letter-spacing: 0; }
      .panel-title { font-size: 24px; font-weight: 700; fill: #ffffff; }
      .state-title { font-size: 20px; font-weight: 700; fill: #ffffff; }
      .state-note { font-size: 15px; fill: #b9ecff; }
      .tag-text { font-size: 15px; fill: #f7fdff; }
      .note-text { font-size: 16px; fill: #dbf8ff; }
      .tiny { font-size: 12px; fill: #7ecfe8; }
      .panel { fill: #092238; stroke: #87ddf6; stroke-width: 2.4; rx: 18; opacity: 0.94; filter: url(#pencil-line); }
      .state { fill: #0e2c45; stroke: #d9f7ff; stroke-width: 2.7; rx: 13; filter: url(#pencil-line); }
      .state-ok { fill: #0d3a35; stroke: #b8ffe9; stroke-width: 2.7; rx: 13; filter: url(#pencil-line); }
      .state-warn { fill: #3a2812; stroke: #ffd29a; stroke-width: 2.7; rx: 13; filter: url(#pencil-line); }
      .note { fill: #0b2a42; stroke: #5dc8ef; stroke-width: 1.8; rx: 10; opacity: 0.94; filter: url(#pencil-line); }
      .tag { fill: #123450; stroke: #83dff8; stroke-width: 1.4; rx: 7; filter: url(#pencil-line); }
      .arrow { stroke: #d9f7ff; stroke-width: 2.7; fill: none; marker-end: url(#arrow); filter: url(#pencil-line); }
      .return { stroke: #9de7ff; stroke-width: 2.4; fill: none; marker-end: url(#arrow); filter: url(#pencil-line); }
      .dash { stroke: #b8ffe9; stroke-width: 2.2; fill: none; stroke-dasharray: 8 9; marker-end: url(#arrow); filter: url(#pencil-line); }
      .draft { stroke: #4ea8c9; stroke-width: 1.2; fill: none; opacity: 0.65; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1250" fill="#061421"/>
  <rect x="0" y="0" width="1800" height="1250" fill="url(#big-grid)"/>
  <rect x="0" y="0" width="1800" height="1250" fill="#061421" opacity="0.18" filter="url(#paper-noise)"/>

  <line x1="80" y1="88" x2="1720" y2="88" class="draft"/>
  <line x1="80" y1="1168" x2="1720" y2="1168" class="draft"/>
  <line x1="80" y1="88" x2="80" y2="1168" class="draft"/>
  <line x1="1720" y1="88" x2="1720" y2="1168" class="draft"/>
  <text x="900" y="66" text-anchor="middle" class="title">SIMPLEBUS FSM BLUEPRINT</text>
  <text x="900" y="102" text-anchor="middle" class="subtitle">24-bit address bus / generated 64KB memory windows / exact state-machine labels</text>
  <text x="115" y="1220" class="tiny">DRAWING: simplebus_fsm</text>
  <text x="1510" y="1220" class="tiny">REVISION: readability pass</text>

  <rect x="95" y="145" width="1610" height="455" class="panel"/>
  <text x="135" y="190" class="panel-title">PROCESSOR INTERFACE THREAD</text>

  <rect x="155" y="270" width="250" height="108" class="state"/>
  <text x="280" y="311" text-anchor="middle" class="state-title">PROC_IDLE</text>
  <text x="280" y="341" text-anchor="middle" class="state-note">request lines low</text>

  <rect x="525" y="270" width="265" height="108" class="state"/>
  <text x="657" y="311" text-anchor="middle" class="state-title">PROC_REQUEST</text>
  <text x="657" y="341" text-anchor="middle" class="state-note">drive Addr/op/Data</text>

  <rect x="920" y="270" width="270" height="108" class="state"/>
  <text x="1055" y="311" text-anchor="middle" class="state-title">PROC_WAIT_ACK</text>
  <text x="1055" y="341" text-anchor="middle" class="state-note">watch Ack</text>

  <rect x="1325" y="210" width="270" height="108" class="state-ok"/>
  <text x="1460" y="251" text-anchor="middle" class="state-title">PROC_COMPLETE</text>
  <text x="1460" y="281" text-anchor="middle" class="state-note">capture read data</text>

  <rect x="1325" y="398" width="270" height="108" class="state-warn"/>
  <text x="1460" y="439" text-anchor="middle" class="state-title">PROC_TIMEOUT</text>
  <text x="1460" y="469" text-anchor="middle" class="state-note">no selected target</text>

  <path d="M405 324 L525 324" class="arrow"/>
  <rect x="426" y="278" width="78" height="32" class="tag"/>
  <text x="465" y="299" text-anchor="middle" class="tag-text">task</text>

  <path d="M790 324 L920 324" class="arrow"/>
  <rect x="821" y="278" width="70" height="32" class="tag"/>
  <text x="856" y="299" text-anchor="middle" class="tag-text">req=1</text>

  <path d="M1190 302 L1325 260" class="arrow"/>
  <rect x="1233" y="240" width="78" height="32" class="tag"/>
  <text x="1272" y="261" text-anchor="middle" class="tag-text">Ack=1</text>

  <path d="M1190 356 L1325 432" class="arrow"/>
  <rect x="1224" y="386" width="96" height="32" class="tag"/>
  <text x="1272" y="407" text-anchor="middle" class="tag-text">timeout</text>

  <path d="M1460 210 C1460 155 280 155 280 270" class="return"/>
  <rect x="790" y="154" width="176" height="32" class="tag"/>
  <text x="878" y="175" text-anchor="middle" class="tag-text">drop request lines</text>

  <path d="M1460 506 C1460 570 280 570 280 378" class="return"/>
  <rect x="762" y="542" width="224" height="32" class="tag"/>
  <text x="874" y="563" text-anchor="middle" class="tag-text">report failure, release bus</text>

  <rect x="155" y="430" width="520" height="94" class="note"/>
  <text x="183" y="464" class="note-text">Processor tasks are outside the interface.</text>
  <text x="183" y="493" class="note-text">ReadMem samples Data only after Ack.</text>

  <rect x="95" y="665" width="1610" height="435" class="panel"/>
  <text x="135" y="710" class="panel-title">MEMORY INTERFACE THREAD</text>

  <rect x="210" y="790" width="275" height="112" class="state"/>
  <text x="348" y="833" text-anchor="middle" class="state-title">MEM_IDLE</text>
  <text x="348" y="864" text-anchor="middle" class="state-note">Ack=0, Data=Z</text>

  <rect x="810" y="790" width="300" height="112" class="state-ok"/>
  <text x="960" y="833" text-anchor="middle" class="state-title">MEM_RESPOND</text>
  <text x="960" y="864" text-anchor="middle" class="state-note">Ack=1 if selected</text>

  <path d="M485 846 L810 846" class="arrow"/>
  <rect x="571" y="760" width="160" height="62" class="tag"/>
  <text x="651" y="784" text-anchor="middle" class="tag-text">Strobe=1</text>
  <text x="651" y="807" text-anchor="middle" class="tag-text">base match</text>

  <path d="M960 902 C960 1020 348 1020 348 902" class="return"/>
  <rect x="545" y="998" width="220" height="32" class="tag"/>
  <text x="655" y="1019" text-anchor="middle" class="tag-text">Strobe=0, release bus</text>

  <path d="M348 790 C348 725 960 725 960 790" class="dash"/>
  <rect x="532" y="707" width="250" height="32" class="tag"/>
  <text x="657" y="728" text-anchor="middle" class="tag-text">read: latch selected byte</text>

  <rect x="1225" y="745" width="360" height="205" class="note"/>
  <text x="1405" y="786" text-anchor="middle" class="state-title">ADDRESS DECODE</text>
  <text x="1260" y="827" class="note-text">Addr[23:16] = memory base</text>
  <text x="1260" y="858" class="note-text">Addr[15:0]  = local byte offset</text>
  <text x="1260" y="889" class="note-text">one instance owns 64KB</text>
  <text x="1260" y="920" class="note-text">only selected target drives Ack/Data</text>

  <rect x="210" y="1050" width="900" height="48" class="note"/>
  <text x="660" y="1081" text-anchor="middle" class="note-text">Write cycles sample processor Data in MEM_IDLE before acknowledging in MEM_RESPOND.</text>
</svg>
